name: CyCode Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install project
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e .

      - name: Check code (Ruff)
        # --fix : corrige automatiquement les erreurs mineures
        # --ignore : désactive les règles de style qui bloquent le build sur votre projet actuel
        run: ruff check src/ --fix --ignore E701,E702,E722,F401,E401,E741,F541

      - name: Check types (Mypy)
        # --ignore-missing-imports : évite les erreurs si des bibliothèques externes manquent de typage
        run: mypy src/ --ignore-missing-imports
