name: CyCode CI Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          # Installe votre projet en mode édition pour tester l'entrée 'cycode'
          pip install -e .

      - name: Check code style (Ruff)
        run: ruff check src/

      - name: Check type hints (Mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Test command entry point
        run: |
          # Vérifie que la commande 'cycode' est bien reconnue
          cycode --help