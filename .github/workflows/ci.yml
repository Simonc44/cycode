name: CyCode Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e .

      - name: Check code (Ruff)
        # On exécute ruff avec les ignores configurés pour votre style de code actuel
        run: ruff check src/ --fix --ignore E701,E702,E722,F401,E401,E741,F541

      - name: Check types (Mypy)
        # On utilise le fichier mypy.ini à la racine pour la configuration permissive
        run: mypy src/ --config-file mypy.ini
