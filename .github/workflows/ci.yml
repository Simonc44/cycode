name: CyCode Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install project
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e .

      - name: Check code (Ruff)
        # On ignore les règles de style qui bloquent votre syntaxe actuelle (E701, E702, E722, F401)
        run: ruff check src/ --ignore E701,E702,E722,F401,E401

      - name: Check types (Mypy)
        # On ignore les erreurs d'imports manquants pour les dépendances externes
        run: mypy src/ --ignore-missing-imports
